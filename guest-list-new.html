<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guest List - TalonPro Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50">
    <!-- Header -->
    <header class="bg-white border-b border-gray-200 fixed top-0 left-0 right-0 z-40 h-16">
        <div class="flex items-center justify-between h-full px-6">
            <div class="flex items-center space-x-4">
                <h1 class="text-xl font-bold text-gray-800">TalonPro Portal</h1>
                <p class="text-xs text-gray-400 mt-0.5">Prototype by Harsha</p>
            </div>
            <div class="flex-1 max-w-2xl mx-8">
                <div class="relative">
                    <input type="text" placeholder="Search guests, cases, tasks..."
                           class="w-full px-4 py-2 pl-10 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
                </div>
            </div>
            <div class="flex items-center space-x-4">
                <button class="relative p-2 text-gray-600 hover:bg-gray-100 rounded-lg">
                    <i class="fas fa-bell text-xl"></i>
                    <span class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full"></span>
                </button>
                <div class="flex items-center space-x-2 cursor-pointer hover:bg-gray-100 px-3 py-2 rounded-lg">
                    <div class="w-8 h-8 bg-blue-500 rounded-full flex items-center justify-center text-white">
                        <i class="fas fa-user"></i>
                    </div>
                    <span class="text-sm font-medium">Admin User</span>
                </div>
            </div>
        </div>
    </header>

    <!-- Sidebar -->
    <aside class="fixed left-0 top-16 bottom-0 w-64 bg-gray-900 text-white overflow-y-auto">
        <nav class="p-4">
            <a href="index.html" class="nav-item">
                <i class="fas fa-home"></i>
                <span>Dashboard</span>
            </a>
            <a href="guest-list-new.html" class="nav-item active">
                <i class="fas fa-users"></i>
                <span>Guests</span>
            </a>
            <a href="messages.html" class="nav-item">
                <i class="fas fa-comments"></i>
                <span>Messages</span>
            </a>
            <a href="tasks.html" class="nav-item">
                <i class="fas fa-tasks"></i>
                <span>Tasks</span>
            </a>
            <a href="documents.html" class="nav-item">
                <i class="fas fa-file-alt"></i>
                <span>Documents</span>
            </a>
            <a href="surveys.html" class="nav-item"><i class="fas fa-clipboard-list"></i><span>Surveys</span></a>
            <a href="receipts.html" class="nav-item">
                <i class="fas fa-receipt"></i>
                <span>Receipts</span>
            </a>
            <a href="templates.html" class="nav-item">
                <i class="fas fa-file-invoice"></i>
                <span>Templates</span>
            </a>
            <a href="rules.html" class="nav-item">
                <i class="fas fa-cogs"></i>
                <span>Automation Rules</span>
            </a>
            <a href="reports.html" class="nav-item">
                <i class="fas fa-chart-bar"></i>
                <span>Reports</span>
            </a>
            <a href="ai-features.html" class="nav-item">
                <i class="fas fa-brain"></i>
                <span>AI Uses</span>
            </a>
            <a href="guest-mobile.html" class="nav-item">
                <i class="fas fa-mobile-alt"></i>
                <span>Guest Mobile</span>
            </a>
            <a href="settings.html" class="nav-item">
                <i class="fas fa-cog"></i>
                <span>Settings</span>
            </a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="ml-64 mt-16 p-6">
        <div class="flex items-center justify-between mb-6">
            <div>
                <h2 class="text-2xl font-bold text-gray-800">
                    <i class="fas fa-filter mr-2"></i>
                    Guest List (7453)
                </h2>
                <p class="text-gray-600">Manage guest information</p>
            </div>
            <button onclick="showModal('createGuestModal')" class="btn-primary">
                <i class="fas fa-plus mr-2"></i>
                Add Guest
            </button>
        </div>

        <!-- Filters -->
        <div class="card mb-6">
            <div class="grid grid-cols-4 gap-4">
                <div class="relative">
                    <input type="text" id="guestSearch" placeholder="Guest Search"
                           class="w-full px-4 py-2 pr-8 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                           onkeyup="filterGuests()">
                    <button class="absolute right-2 top-2.5 text-gray-400 hover:text-gray-600">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="relative">
                    <input type="text" placeholder="ID" class="w-full px-4 py-2 pr-8 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <button class="absolute right-2 top-2.5 text-gray-400 hover:text-gray-600">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="relative">
                    <input type="text" placeholder="Lead Requirements" class="w-full px-4 py-2 pr-8 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <button class="absolute right-2 top-2.5 text-gray-400 hover:text-gray-600">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div>
                    <select class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option>Saved Filter</option>
                        <option>Active Guests</option>
                        <option>Checked Out</option>
                        <option>Pending Check-in</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Guest Cards -->
        <div class="space-y-4" id="guestCardsContainer">
            <!-- Guest cards will be loaded here -->
        </div>
    </main>

    <!-- Create Guest Modal -->
    <div id="createGuestModal" class="modal">
        <div class="modal-content max-w-4xl">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-xl font-semibold">Create Guest</h3>
                <button onclick="hideModal('createGuestModal')" class="text-gray-400 hover:text-gray-600">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <form class="space-y-4">
                <div class="grid grid-cols-3 gap-4">
                    <div>
                        <label class="form-label">First Name *</label>
                        <input type="text" class="form-input" required>
                    </div>
                    <div>
                        <label class="form-label">Middle Name</label>
                        <input type="text" class="form-input">
                    </div>
                    <div>
                        <label class="form-label">Last Name *</label>
                        <input type="text" class="form-input" required>
                    </div>
                </div>
                <div class="grid grid-cols-3 gap-4">
                    <div>
                        <label class="form-label">Mobile Phone *</label>
                        <input type="tel" class="form-input" required>
                    </div>
                    <div>
                        <label class="form-label">Mobile Phone 2</label>
                        <input type="tel" class="form-input">
                    </div>
                    <div>
                        <label class="form-label">Email</label>
                        <input type="email" class="form-input">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="form-label">Company</label>
                        <input type="text" class="form-input">
                    </div>
                    <div>
                        <label class="form-label">Company Contact</label>
                        <input type="text" class="form-input">
                    </div>
                </div>
                <div class="grid grid-cols-3 gap-4">
                    <div>
                        <label class="form-label">Arrival Date *</label>
                        <input type="date" class="form-input" required>
                    </div>
                    <div>
                        <label class="form-label">Departing Date</label>
                        <input type="date" class="form-input">
                    </div>
                    <div>
                        <label class="form-label">Number of Nights</label>
                        <input type="number" class="form-input">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="form-label">Housing Coordinator *</label>
                        <select class="form-input" required>
                            <option value="">Select coordinator...</option>
                            <option>Toni Westfall</option>
                            <option>Sarah Johnson</option>
                            <option>Mike Davis</option>
                        </select>
                    </div>
                    <div>
                        <label class="form-label">Customer Care Name</label>
                        <select class="form-input">
                            <option value="">Select...</option>
                            <option>Jennifer Cobb</option>
                            <option>Alex Martinez</option>
                        </select>
                    </div>
                </div>
                <div class="flex justify-end space-x-3 mt-6">
                    <button type="button" onclick="hideModal('createGuestModal')" class="btn-secondary">Cancel</button>
                    <button type="submit" class="btn-primary">Create Guest</button>
                </div>
            </form>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
    <script>
        // Enhanced guest data now loaded from data.js

        // Load guest cards on page load
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Enhanced Guests Data:', enhancedGuests);
            if (!enhancedGuests || enhancedGuests.length === 0) {
                console.error('No guest data found! Check if data.js is loaded.');
            }
            loadGuestCards();
        });

        function loadGuestCards() {
            const container = document.getElementById('guestCardsContainer');
            if (!container) return;

            const statusColors = {
                'Arrival': 'bg-yellow-400 text-gray-900',
                'Checked Out': 'bg-blue-500 text-white',
                'Active': 'bg-green-500 text-white',
                'Pending': 'bg-orange-500 text-white'
            };

            container.innerHTML = enhancedGuests.map(guest => `
                <div class="bg-white rounded-lg hover:shadow-md transition-all border border-gray-200 p-3 ${guest.status === 'Arrival' ? 'shadow-md border-l-4 border-l-blue-500' : 'shadow-sm'}">
                    <!-- Compact Header Row -->
                    <div class="flex items-center justify-between mb-2">
                        <div class="flex items-center space-x-2 flex-1">
                            <h3 class="text-lg font-bold text-gray-900">${guest.firstName} ${guest.lastName}</h3>
                            <span class="text-xs font-semibold px-2 py-0.5 rounded ${
                                guest.status === 'Arrival' ? 'bg-blue-100 text-blue-700' :
                                guest.status === 'Active' ? 'bg-green-100 text-green-700' :
                                guest.status === 'Checked Out' ? 'bg-gray-100 text-gray-700' :
                                'bg-orange-100 text-orange-700'
                            }">
                                ${guest.status}
                            </span>
                            ${guest.hasMultipleStays ? `
                                <span class="text-xs font-medium px-1.5 py-0.5 bg-orange-50 text-orange-700 rounded border border-orange-200">
                                    ${guest.relatedStays} Stays
                                </span>
                            ` : ''}
                            <span class="text-xs text-gray-500 font-mono ml-2">ID: ${guest.guestId}</span>
                        </div>
                        <button onclick="window.location.href='guest-detail-new.html?id=${guest.id}'" class="bg-blue-600 hover:bg-blue-700 text-white text-xs font-medium px-3 py-1.5 rounded transition-colors">
                            View Details →
                        </button>
                    </div>

                    <!-- Contact & Stay Info - Single Compact Row -->
                    <div class="grid grid-cols-10 gap-2 mb-2 pb-2 border-b border-gray-100 text-xs">
                        <div class="col-span-2">
                            <p class="text-gray-500 mb-0.5">Email</p>
                            <p class="font-medium text-gray-900 truncate">${guest.email}</p>
                        </div>
                        <div class="col-span-2">
                            <p class="text-gray-500 mb-0.5">Phone</p>
                            <p class="font-medium text-gray-900">${guest.phone}</p>
                        </div>
                        <div class="col-span-2">
                            <p class="text-gray-500 mb-0.5">Room</p>
                            <p class="font-medium text-gray-900">Room ${guest.room}</p>
                        </div>
                        <div class="col-span-2">
                            <p class="text-gray-500 mb-0.5">Arrival</p>
                            <p class="font-medium text-gray-900">${guest.arrivalDate}</p>
                        </div>
                        <div class="col-span-2">
                            <p class="text-gray-500 mb-0.5">Departure</p>
                            <p class="font-medium text-gray-900">${guest.departingDate}</p>
                        </div>
                    </div>

                    <!-- Coordinator & Details - Single Compact Row -->
                    <div class="grid grid-cols-10 gap-2 text-xs">
                        <div class="col-span-2">
                            <p class="text-gray-500 mb-0.5">Housing Coord</p>
                            <p class="font-medium text-gray-800">${guest.housingCoordinator}</p>
                        </div>
                        <div class="col-span-2">
                            <p class="text-gray-500 mb-0.5">Hotel Coord</p>
                            <p class="font-medium text-gray-800">${guest.hotelCoordinator || '-'}</p>
                        </div>
                        <div class="col-span-2">
                            <p class="text-gray-500 mb-0.5">Customer Care</p>
                            <p class="font-medium text-gray-800">${guest.customerCare}</p>
                        </div>
                        <div class="col-span-2">
                            <p class="text-gray-500 mb-0.5">Division</p>
                            <p class="font-medium text-gray-800">${guest.division}</p>
                        </div>
                        <div class="col-span-2">
                            <p class="text-gray-500 mb-0.5">Stay Type</p>
                            <p class="font-medium text-gray-800">${guest.stayType}</p>
                        </div>
                    </div>
                </div>
            `).join('');

        }

        function showRelatedStays(guestId) {
            const guest = enhancedGuests.find(g => g.id === guestId);
            alert(`This guest has ${guest.relatedStays} related stays.\n\nIn the full application, this would show a modal with all related stays.`);
        }

        function filterGuests() {
            const searchTerm = document.getElementById('guestSearch').value.toLowerCase();
            // In a real app, this would filter the results
            loadGuestCards();
        }
    </script>
</body>
</html>
