<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks - TalonPro Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50">
    <!-- Header -->
    <header class="bg-white border-b border-gray-200 fixed top-0 left-0 right-0 z-40 h-16">
        <div class="flex items-center justify-between h-full px-6">
            <div class="flex items-center space-x-4">
                <h1 class="text-xl font-bold text-gray-800">TalonPro Portal</h1>
            </div>
            <div class="flex-1 max-w-2xl mx-8">
                <div class="relative">
                    <input type="text" placeholder="Search guests, cases, tasks..."
                           class="w-full px-4 py-2 pl-10 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
                </div>
            </div>
            <div class="flex items-center space-x-4">
                <button class="relative p-2 text-gray-600 hover:bg-gray-100 rounded-lg">
                    <i class="fas fa-bell text-xl"></i>
                    <span class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full"></span>
                </button>
                <div class="flex items-center space-x-2 cursor-pointer hover:bg-gray-100 px-3 py-2 rounded-lg">
                    <div class="w-8 h-8 bg-blue-500 rounded-full flex items-center justify-center text-white">
                        <i class="fas fa-user"></i>
                    </div>
                    <span class="text-sm font-medium">Admin User</span>
                </div>
            </div>
        </div>
    </header>

    <!-- Sidebar -->
    <aside class="fixed left-0 top-16 bottom-0 w-64 bg-gray-900 text-white overflow-y-auto">
        <nav class="p-4">
            <a href="index.html" class="nav-item">
                <i class="fas fa-home"></i>
                <span>Dashboard</span>
            </a>
            <a href="guest-list-new.html" class="nav-item">
                <i class="fas fa-users"></i>
                <span>Guests</span>
            </a>
            <a href="messages.html" class="nav-item">
                <i class="fas fa-comments"></i>
                <span>Messages</span>
            </a>
            <a href="tasks.html" class="nav-item active">
                <i class="fas fa-tasks"></i>
                <span>Tasks</span>
            </a>
            <a href="documents.html" class="nav-item">
                <i class="fas fa-file-alt"></i>
                <span>Documents</span>
            </a>
            <a href="receipts.html" class="nav-item">
                <i class="fas fa-receipt"></i>
                <span>Receipts</span>
            </a>
            <a href="templates.html" class="nav-item">
                <i class="fas fa-file-invoice"></i>
                <span>Templates</span>
            </a>
            <a href="rules.html" class="nav-item">
                <i class="fas fa-cogs"></i>
                <span>Automation Rules</span>
            </a>
            <a href="reports.html" class="nav-item">
                <i class="fas fa-chart-bar"></i>
                <span>Reports</span>
            </a>
            <a href="ai-features.html" class="nav-item">
                <i class="fas fa-brain"></i>
                <span>AI Uses</span>
            </a>
            <a href="settings.html" class="nav-item">
                <i class="fas fa-cog"></i>
                <span>Settings</span>
            </a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="ml-64 mt-16 p-6">
        <div class="flex items-center justify-between mb-6">
            <div>
                <h2 class="text-2xl font-bold text-gray-800">Task Management</h2>
                <p class="text-gray-600">Track and manage all tasks</p>
            </div>
            <button onclick="showModal('createTaskModal')" class="btn-primary">
                <i class="fas fa-plus mr-2"></i>
                Create Task
            </button>
        </div>

        <!-- Filters -->
        <div class="card mb-6">
            <div class="flex items-center space-x-4">
                <button onclick="filterTasks('all')" class="filter-btn active" data-filter="all">
                    All Tasks
                </button>
                <button onclick="filterTasks('me')" class="filter-btn" data-filter="me">
                    Assigned to Me
                </button>
                <button onclick="filterTasks('overdue')" class="filter-btn" data-filter="overdue">
                    Overdue
                </button>
                <button onclick="filterTasks('completed')" class="filter-btn" data-filter="completed">
                    Completed
                </button>
            </div>
        </div>

        <!-- Tasks Table -->
        <div class="card">
            <div class="overflow-x-auto">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Task</th>
                            <th>Case</th>
                            <th>Assigned To</th>
                            <th>Due Date</th>
                            <th>Status</th>
                            <th>Priority</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="tasksTable">
                        <!-- Tasks will be loaded here -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Create Task Modal -->
    <div id="createTaskModal" class="modal">
        <div class="modal-content max-w-lg">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-xl font-semibold">Create Task</h3>
                <button onclick="hideModal('createTaskModal')" class="text-gray-400 hover:text-gray-600">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <form class="space-y-4">
                <div>
                    <label class="form-label">Title</label>
                    <input type="text" class="form-input">
                </div>
                <div>
                    <label class="form-label">Description</label>
                    <textarea class="form-input" rows="3"></textarea>
                </div>
                <div>
                    <label class="form-label">Case</label>
                    <select class="form-input">
                        <option value="">Select case...</option>
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="form-label">Assigned To</label>
                        <select class="form-input">
                            <option>John Smith</option>
                            <option>Sarah Johnson</option>
                            <option>Mike Davis</option>
                        </select>
                    </div>
                    <div>
                        <label class="form-label">Due Date</label>
                        <input type="date" class="form-input">
                    </div>
                </div>
                <div>
                    <label class="form-label">Priority</label>
                    <select class="form-input">
                        <option>Low</option>
                        <option>Medium</option>
                        <option>High</option>
                        <option>Urgent</option>
                    </select>
                </div>
                <div class="flex justify-end space-x-3 mt-6">
                    <button type="button" onclick="hideModal('createTaskModal')" class="btn-secondary">Cancel</button>
                    <button type="submit" class="btn-primary">Create</button>
                </div>
            </form>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadAllTasks();
        });

        function filterTasks(filter) {
            // Remove active class from all buttons
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            // Add active class to clicked button
            document.querySelector(`[data-filter="${filter}"]`).classList.add('active');

            // Filter logic would go here
            // For demo purposes, we'll just reload all tasks
            loadAllTasks(filter);
        }
    </script>
</body>
</html>
