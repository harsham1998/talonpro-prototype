<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guest List - TalonPro Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50">
    <!-- Header -->
    <header class="bg-white border-b border-gray-200 fixed top-0 left-0 right-0 z-40 h-16">
        <div class="flex items-center justify-between h-full px-6">
            <div class="flex items-center space-x-4">
                <h1 class="text-xl font-bold text-gray-800">TalonPro Portal</h1>
            </div>
            <div class="flex-1 max-w-2xl mx-8">
                <div class="relative">
                    <input type="text" placeholder="Search guests, cases, tasks..."
                           class="w-full px-4 py-2 pl-10 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
                </div>
            </div>
            <div class="flex items-center space-x-4">
                <button class="relative p-2 text-gray-600 hover:bg-gray-100 rounded-lg">
                    <i class="fas fa-bell text-xl"></i>
                    <span class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full"></span>
                </button>
                <div class="flex items-center space-x-2 cursor-pointer hover:bg-gray-100 px-3 py-2 rounded-lg">
                    <div class="w-8 h-8 bg-blue-500 rounded-full flex items-center justify-center text-white">
                        <i class="fas fa-user"></i>
                    </div>
                    <span class="text-sm font-medium">Admin User</span>
                </div>
            </div>
        </div>
    </header>

    <!-- Sidebar -->
    <aside class="fixed left-0 top-16 bottom-0 w-64 bg-gray-900 text-white overflow-y-auto">
        <nav class="p-4">
            <a href="index.html" class="nav-item">
                <i class="fas fa-home"></i>
                <span>Dashboard</span>
            </a>
            <a href="guest-list-new.html" class="nav-item active">
                <i class="fas fa-users"></i>
                <span>Guests</span>
            </a>
            <a href="messages.html" class="nav-item">
                <i class="fas fa-comments"></i>
                <span>Messages</span>
            </a>
            <a href="tasks.html" class="nav-item">
                <i class="fas fa-tasks"></i>
                <span>Tasks</span>
            </a>
            <a href="documents.html" class="nav-item">
                <i class="fas fa-file-alt"></i>
                <span>Documents</span>
            </a>
            <a href="receipts.html" class="nav-item">
                <i class="fas fa-receipt"></i>
                <span>Receipts</span>
            </a>
            <a href="templates.html" class="nav-item">
                <i class="fas fa-file-invoice"></i>
                <span>Templates</span>
            </a>
            <a href="rules.html" class="nav-item">
                <i class="fas fa-cogs"></i>
                <span>Automation Rules</span>
            </a>
            <a href="reports.html" class="nav-item">
                <i class="fas fa-chart-bar"></i>
                <span>Reports</span>
            </a>
            <a href="settings.html" class="nav-item">
                <i class="fas fa-cog"></i>
                <span>Settings</span>
            </a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="ml-64 mt-16 p-6">
        <div class="flex items-center justify-between mb-6">
            <div>
                <h2 class="text-2xl font-bold text-gray-800">Guests</h2>
                <p class="text-gray-600">Manage guest information and cases</p>
            </div>
            <button onclick="showModal('createGuestModal')" class="btn-primary">
                <i class="fas fa-plus mr-2"></i>
                Create Guest
            </button>
        </div>

        <!-- Guest List Panel -->
        <div class="card">
            <div class="mb-4">
                <div class="relative">
                    <input type="text" id="guestSearch" placeholder="Search guests..."
                           class="w-full px-4 py-2 pl-10 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                           onkeyup="filterGuests()">
                    <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
                </div>
            </div>

            <div class="overflow-x-auto">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Guest Name</th>
                            <th>Phone</th>
                            <th>Case ID</th>
                            <th>Status</th>
                            <th>Check In</th>
                            <th>Check Out</th>
                            <th>Coordinator</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="guestListTable">
                        <!-- Guests will be loaded here -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Create Guest Modal -->
    <div id="createGuestModal" class="modal">
        <div class="modal-content max-w-2xl">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-xl font-semibold">Create Guest</h3>
                <button onclick="hideModal('createGuestModal')" class="text-gray-400 hover:text-gray-600">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <form class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="form-label">First Name *</label>
                        <input type="text" class="form-input" required>
                    </div>
                    <div>
                        <label class="form-label">Last Name *</label>
                        <input type="text" class="form-input" required>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="form-label">Phone *</label>
                        <input type="tel" class="form-input" required>
                    </div>
                    <div>
                        <label class="form-label">Email</label>
                        <input type="email" class="form-input">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="form-label">Adjuster</label>
                        <input type="text" class="form-input">
                    </div>
                    <div>
                        <label class="form-label">Coordinator *</label>
                        <select class="form-input" required>
                            <option value="">Select coordinator...</option>
                            <option>John Smith</option>
                            <option>Sarah Johnson</option>
                            <option>Mike Davis</option>
                        </select>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="form-label">Check In Date</label>
                        <input type="date" class="form-input">
                    </div>
                    <div>
                        <label class="form-label">Check Out Date</label>
                        <input type="date" class="form-input">
                    </div>
                </div>
                <div class="flex justify-end space-x-3 mt-6">
                    <button type="button" onclick="hideModal('createGuestModal')" class="btn-secondary">Cancel</button>
                    <button type="submit" class="btn-primary">Create Guest</button>
                </div>
            </form>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
    <script>
        // Load guests on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadGuestList();
        });

        function filterGuests() {
            const searchTerm = document.getElementById('guestSearch').value.toLowerCase();
            const rows = document.querySelectorAll('#guestListTable tr');

            rows.forEach(row => {
                const text = row.textContent.toLowerCase();
                row.style.display = text.includes(searchTerm) ? '' : 'none';
            });
        }
    </script>
</body>
</html>
