<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surveys - TalonPro Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50">

    <!-- Header -->
    <header class="bg-white border-b border-gray-200 fixed top-0 left-0 right-0 z-40 h-16">
        <div class="flex items-center justify-between h-full px-6">
            <h1 class="text-xl font-bold text-gray-800">TalonPro Portal</h1>
            <div class="flex-1 max-w-2xl mx-8">
                <div class="relative">
                    <input type="text" placeholder="Search surveys..." id="searchInput"
                           class="w-full px-4 py-2 pl-10 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
                </div>
            </div>
            <div class="flex items-center space-x-4">
                <button class="relative p-2 text-gray-600 hover:bg-gray-100 rounded-lg">
                    <i class="fas fa-bell text-xl"></i>
                    <span class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full"></span>
                </button>
                <div class="flex items-center space-x-2 cursor-pointer hover:bg-gray-100 px-3 py-2 rounded-lg">
                    <div class="w-8 h-8 bg-blue-500 rounded-full flex items-center justify-center text-white">
                        <i class="fas fa-user"></i>
                    </div>
                    <span class="text-sm font-medium">Admin User</span>
                </div>
            </div>
        </div>
    </header>

    <!-- Sidebar -->
    <aside class="fixed left-0 top-16 bottom-0 w-64 bg-gray-900 text-white overflow-y-auto">
        <nav class="p-4">
            <a href="index.html" class="nav-item"><i class="fas fa-home"></i><span>Dashboard</span></a>
            <a href="guest-list-new.html" class="nav-item"><i class="fas fa-users"></i><span>Guests</span></a>
            <a href="messages.html" class="nav-item"><i class="fas fa-comments"></i><span>Messages</span></a>
            <a href="tasks.html" class="nav-item"><i class="fas fa-tasks"></i><span>Tasks</span></a>
            <a href="documents.html" class="nav-item"><i class="fas fa-file-alt"></i><span>Documents</span></a>
            <a href="receipts.html" class="nav-item"><i class="fas fa-receipt"></i><span>Receipts</span></a>
            <a href="surveys.html" class="nav-item active"><i class="fas fa-clipboard-list"></i><span>Surveys</span></a>
            <a href="templates.html" class="nav-item"><i class="fas fa-file-invoice"></i><span>Templates</span></a>
            <a href="rules.html" class="nav-item"><i class="fas fa-cogs"></i><span>Automation Rules</span></a>
            <a href="reports.html" class="nav-item"><i class="fas fa-chart-bar"></i><span>Reports</span></a>
            <a href="ai-features.html" class="nav-item"><i class="fas fa-brain"></i><span>AI Uses</span></a>
            <a href="guest-mobile.html" class="nav-item">
                <i class="fas fa-mobile-alt"></i>
                <span>Guest Mobile</span>
            </a>
            <a href="settings.html" class="nav-item"><i class="fas fa-cog"></i><span>Settings</span></a>
        </nav>

    <!-- Main Content -->
    <main class="ml-64 mt-16 flex h-[calc(100vh-64px)]">

        <!-- Left Panel: Survey Templates -->
        <div class="w-80 bg-white border-r border-gray-200 flex flex-col flex-shrink-0">
            <div class="p-4 border-b border-gray-200">
                <div class="flex items-center justify-between mb-3">
                    <h2 class="text-lg font-semibold text-gray-800">Survey Templates</h2>
                    <button onclick="showModal('newSurveyModal')" class="w-8 h-8 bg-blue-500 text-white rounded-lg flex items-center justify-center hover:bg-blue-600">
                        <i class="fas fa-plus text-sm"></i>
                    </button>
                </div>
                <!-- Filter -->
                <select id="filterStatus" onchange="renderList()" class="form-input text-sm w-full">
                    <option value="all">All Surveys</option>
                    <option value="active" selected>Active</option>
                    <option value="draft">Draft</option>
                    <option value="archived">Archived</option>
                </select>
            </div>
            <div class="flex-1 overflow-y-auto" id="surveyList"></div>
        </div>

        <!-- Right Panel: Survey Detail -->
        <div class="flex-1 flex flex-col overflow-hidden">
            <!-- Empty state -->
            <div class="flex-1 flex items-center justify-center" id="emptyState">
                <div class="text-center text-gray-400">
                    <i class="fas fa-clipboard-list text-6xl mb-4"></i>
                    <p class="text-lg font-medium">Select a survey</p>
                    <p class="text-sm">Choose a template to preview or send</p>
                </div>
            </div>

            <!-- Survey Detail -->
            <div class="flex-1 flex-col hidden overflow-y-auto" id="surveyDetail">
                <!-- Detail Header -->

                    <div class="flex items-start justify-between">

                            </div>

                        </div>
                        <div class="flex items-center gap-2">

                                <i class="fas fa-paper-plane mr-2"></i>Send Survey
                            </button>
                            <button class="btn-secondary text-sm">
                                <i class="fas fa-edit mr-1"></i>Edit
                            </button>
                        </div>
                    </div>
                    <!-- Stats row -->
                    <div class="flex gap-6 mt-4" id="detailStats"></div>
                </div>

                <!-- Survey Questions Preview -->
                <div class="p-6 flex-1">
                    <div class="max-w-2xl">
                        <h3 class="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-4">Survey Preview</h3>
                        <div id="questionList" class="space-y-4"></div>

                        <!-- Responses Tab -->
                        <div class="mt-8">
                            <h3 class="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-4">Recent Responses</h3>
                            <div id="responseList"></div>

    </main>

    <!-- Send Survey Modal -->
    <div id="sendSurveyModal" class="modal">
        <div class="modal-content max-w-lg">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-xl font-semibold">Send Survey</h3>
                <button onclick="hideModal('sendSurveyModal')" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times text-xl"></i></button>
            </div>
            <form class="space-y-4">
                <div>
                    <label class="form-label">Survey</label>
                    <input type="text" class="form-input bg-gray-50" id="sendSurveyName" readonly>
                </div>
                <div>
                    <label class="form-label">Send To</label>
                    <select class="form-input">
                        <option>Select Guest...</option>
                        <option>James Wilson — Case #2024-0891</option>
                        <option>Maria Garcia — Case #2024-0892</option>
                        <option>Robert Chen — Case #2024-0893</option>
                        <option>Sarah Thompson — Case #2024-0894</option>
                        <option>David Martinez — Case #2024-0895</option>
                        <option>Jennifer Lee — Case #2024-0896</option>
                        <option>All Active Guests (46)</option>
                    </select>
                </div>
                <div>
                    <label class="form-label">Delivery Channel</label>
                    <div class="flex gap-3">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" checked class="rounded"> <span class="text-sm">SMS</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" checked class="rounded"> <span class="text-sm">Email</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" class="rounded"> <span class="text-sm">In-App (Mobile)</span>
                        </label>
                    </div>
                </div>
                <div>
                    <label class="form-label">Personal Message (optional)</label>
                    <textarea rows="2" class="form-input" placeholder="Add a note before the survey link..."></textarea>
                </div>
                <div>
                    <label class="form-label">Send At</label>
                    <div class="flex gap-2">
                        <label class="flex items-center gap-2 text-sm cursor-pointer">
                            <input type="radio" name="sendTime" checked> Now
                        </label>
                        <label class="flex items-center gap-2 text-sm cursor-pointer">
                            <input type="radio" name="sendTime"> Schedule
                        </label>
                    </div>
                </div>
                <div class="flex justify-end gap-3 pt-2">
                    <button type="button" onclick="hideModal('sendSurveyModal')" class="btn-secondary">Cancel</button>
                    <button type="button" onclick="hideModal('sendSurveyModal')" class="btn-primary"><i class="fas fa-paper-plane mr-2"></i>Send Survey</button>
                </div>
            </form>
        </div>
    </div>

    <!-- New Survey Modal -->
    <div id="newSurveyModal" class="modal">
        <div class="modal-content max-w-lg">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-xl font-semibold">New Survey Template</h3>
                <button onclick="hideModal('newSurveyModal')" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times text-xl"></i></button>
            </div>
            <form class="space-y-4">
                <div>
                    <label class="form-label">Survey Name</label>
                    <input type="text" class="form-input" placeholder="e.g. Post Check-Out Satisfaction">
                </div>
                <div>
                    <label class="form-label">Category</label>
                    <select class="form-input">
                        <option>Guest Experience</option>
                        <option>Property</option>
                        <option>Extension / Stay</option>
                        <option>Financial / Approval</option>
                        <option>Check-In / Check-Out</option>
                        <option>Other</option>
                    </select>
                </div>
                <div>
                    <label class="form-label">Description</label>
                    <textarea rows="2" class="form-input" placeholder="Brief description of this survey's purpose..."></textarea>
                </div>
                <div class="flex justify-end gap-3 pt-2">
                    <button type="button" onclick="hideModal('newSurveyModal')" class="btn-secondary">Cancel</button>
                    <button type="button" onclick="hideModal('newSurveyModal')" class="btn-primary">Create Template</button>
                </div>
            </form>
        </div>
    </div>

        let activeSurveyId = null;

        function renderList() {
            const filter = document.getElementById('filterStatus').value;
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filtered = surveys.filter(s => {
                const matchStatus = filter === 'all' || s.status === filter;
                const matchSearch = s.name.toLowerCase().includes(search) || s.category.toLowerCase().includes(search);
                return matchStatus && matchSearch;
            });

            const grouped = {};
            filtered.forEach(s => {
                if (!grouped[s.category]) grouped[s.category] = [];
                grouped[s.category].push(s);
            });

            const list = document.getElementById('surveyList');
            list.innerHTML = Object.entries(grouped).map(([cat, items]) => `
                <div>
                    <p class="px-4 py-2 text-xs font-semibold text-gray-400 uppercase tracking-wide bg-gray-50 border-b border-gray-100">${cat}</p>
                    ${items.map(s => `
                        <div onclick="openSurvey(${s.id})"
                            class="px-4 py-3 cursor-pointer border-b border-gray-100 hover:bg-gray-50 transition-colors ${activeSurveyId === s.id ? 'bg-blue-50 border-l-4 border-l-blue-500' : ''}">
                            <div class="flex items-start justify-between gap-2">
                                <div class="flex-1 min-w-0">
                                    <p class="font-medium text-gray-800 text-sm leading-tight">${s.name}</p>
                                    ${s.tag ? `<p class="text-xs text-blue-600 mt-0.5">${s.tag}</p>` : ''}
                                    <div class="flex items-center gap-3 mt-1.5 text-xs text-gray-400">
                                        <span><i class="fas fa-paper-plane mr-1"></i>${s.sent} sent</span>
                                        <span><i class="fas fa-check-circle mr-1"></i>${s.rate}%</span>
                                    </div>
                                </div>
                                <span class="text-xs px-1.5 py-0.5 rounded flex-shrink-0 ${s.status === 'active' ? 'bg-green-100 text-green-700' : s.status === 'draft' ? 'bg-yellow-100 text-yellow-700' : 'bg-gray-100 text-gray-500'}">${s.status}</span>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `).join('');
        }

        function openSurvey(id) {
            activeSurveyId = id;
            const s = surveys.find(x => x.id === id);
            renderList();

            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('surveyDetail').classList.remove('hidden');
            document.getElementById('surveyDetail').classList.add('flex');

            document.getElementById('detailTitle').textContent = s.name;
            document.getElementById('sendSurveyName').value = s.name;

            const badgeEl = document.getElementById('detailBadge');
            badgeEl.textContent = s.status;
            badgeEl.className = `badge text-xs ${s.status === 'active' ? 'badge-green' : s.status === 'draft' ? 'badge-yellow' : 'badge-gray'}`;

            document.getElementById('detailMeta').textContent = `${s.category} · ${s.questions.length} questions · ${s.description}`;

            document.getElementById('detailStats').innerHTML = `
                <div class="text-center">
                    <p class="text-2xl font-bold text-gray-800">${s.sent}</p>
                    <p class="text-xs text-gray-500">Sent</p>
                </div>
                <div class="text-center">
                    <p class="text-2xl font-bold text-blue-600">${s.responses.length || s.responses}</p>
                    <p class="text-xs text-gray-500">Responses</p>
                </div>
                <div class="text-center">
                    <p class="text-2xl font-bold ${s.rate >= 80 ? 'text-green-600' : s.rate >= 60 ? 'text-yellow-500' : 'text-red-500'}">${s.rate}%</p>
                    <p class="text-xs text-gray-500">Response Rate</p>
                </div>
                <div class="text-center">
                    <p class="text-2xl font-bold text-gray-800">${s.questions.length}</p>
                    <p class="text-xs text-gray-500">Questions</p>
                </div>
            `;

            // Questions
            const qTypes = { rating: 'fas fa-star', radio: 'fas fa-dot-circle', text: 'fas fa-align-left' };
            document.getElementById('questionList').innerHTML = s.questions.map((q, i) => `
                <div class="card">
                    <div class="flex items-start gap-3">
                        <div class="w-6 h-6 bg-blue-100 rounded-full flex items-center justify-center flex-shrink-0 mt-0.5">
                            <span class="text-xs font-bold text-blue-600">${i + 1}</span>
                        </div>
                        <div class="flex-1">
                            <p class="font-medium text-gray-800 text-sm mb-2">${q.q}</p>
                            ${q.type === 'rating' ? `
                                <div class="flex gap-1">
                                    ${[1,2,3,4,5].map(n => `<div class="w-8 h-8 border border-gray-200 rounded flex items-center justify-center text-sm text-gray-400 cursor-pointer hover:bg-blue-50 hover:border-blue-300">${n}</div>`).join('')}
                                    <span class="text-xs text-gray-400 self-center ml-2">1 = Poor, 5 = Excellent</span>
                                </div>
                            ` : q.type === 'radio' ? `
                                <div class="space-y-1">
                                    ${q.opts.map(o => `<label class="flex items-center gap-2 text-sm text-gray-600 cursor-pointer"><input type="radio" class="text-blue-500"> ${o}</label>`).join('')}
                                </div>
                            ` : `
                                <textarea rows="2" class="form-input text-sm" placeholder="Guest response..."></textarea>
                            `}
                        </div>
                        <span class="text-xs text-gray-400 capitalize flex-shrink-0"><i class="${qTypes[q.type] || 'fas fa-question'} mr-1"></i>${q.type}</span>
                    </div>
                </div>
            `).join('');

            // Responses
            const resp = Array.isArray(s.responses) ? s.responses : [];
            document.getElementById('responseList').innerHTML = resp.length === 0
                ? `<div class="text-center text-gray-400 py-6 border-2 border-dashed border-gray-200 rounded-lg"><i class="fas fa-inbox text-2xl mb-2"></i><p class="text-sm">No responses yet</p></div>`
                : `<div class="space-y-3">${resp.map(r => `
                    <div class="card">
                        <div class="flex items-start justify-between">
                            <div class="flex items-center gap-2">
                                <div class="w-8 h-8 bg-blue-500 rounded-full flex items-center justify-center text-white text-xs font-bold">${r.guest.split(' ').map(n=>n[0]).join('')}</div>
                                <div>
                                    <p class="font-medium text-gray-800 text-sm">${r.guest}</p>
                                    <p class="text-xs text-gray-400">${r.date}</p>
                                </div>
                            </div>
                            ${r.rating ? `<div class="flex gap-0.5">${[1,2,3,4,5].map(n=>`<i class="fas fa-star text-xs ${n<=r.rating?'text-yellow-400':'text-gray-200'}"></i>`).join('')}</div>` : ''}
                        </div>
                        ${r.comment ? `<p class="text-sm text-gray-600 mt-2 pl-10">"${r.comment}"</p>` : ''}
                    </div>
                `).join('')}</div>`;
        }

        function showModal(id) { document.getElementById(id).classList.add('active'); }
        function hideModal(id) { document.getElementById(id).classList.remove('active'); }

        document.querySelectorAll('.modal').forEach(m => m.addEventListener('click', function(e) { if (e.target===this) hideModal(this.id); }));
        document.getElementById('searchInput').addEventListener('input', renderList);

        renderList();
    </script>
</body>
</html>
